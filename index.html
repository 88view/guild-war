<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>길드전 랭킹 대시보드 · [ 빌 런 ] 착한사람들</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#0c1322; --bg2:#0f192b;
    --panel:#15203a; --panel2:#1a2742; --raised:#1f2e4e;
    --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.12);
    --tx:#eaf0fb; --muted:#8a99bd; --dim:#5b6b8e;
    --gold:#f4c451; --gold2:#d99f28;
    --silver:#c3d0ea; --silver2:#8fa3c8;
    --bronze:#dc9255; --bronze2:#b06f37;
    --mine:#46cf86;
    --s9:#ff5e7e; --s8:#ff9f43; --s7:#ffd24d; --s6:#5fd089;
    --s5:#37cdbf; --s4:#46a6ff; --s3:#7f9bff; --s2:#b58cff; --s1:#7787ab;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;
    font-family:'Pretendard Variable','Pretendard',system-ui,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif}
  body{
    font-family:'Pretendard Variable','Pretendard',system-ui,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(244,196,81,.08), transparent 60%),
      radial-gradient(900px 500px at -5% 0%, rgba(70,166,255,.07), transparent 55%),
      var(--bg);
    color:var(--tx); min-height:100vh; -webkit-font-smoothing:antialiased;
    padding:28px clamp(14px,4vw,48px) 56px;
  }
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .wrap{max-width:1240px;margin:0 auto}

  header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:22px}
  .brand .eyebrow{font-size:12px;letter-spacing:.32em;color:var(--gold);font-weight:700;text-transform:uppercase}
  .brand h1{font-size:clamp(26px,4vw,38px);font-weight:800;letter-spacing:-.02em;margin-top:6px;line-height:1.05}
  .brand h1 .guild{background:linear-gradient(120deg,var(--gold),#ffe9a8 55%,var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .sub{color:var(--muted);font-size:13.5px;margin-top:8px}
  .rightcol{display:flex;flex-direction:column;align-items:flex-end;gap:12px}
  .datebox{text-align:right}
  .datebox .d{font-size:13px;color:var(--dim);letter-spacing:.04em}
  .datebox .v{font-size:20px;font-weight:700;margin-top:2px}

  .loadbtn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));
    color:#1a1206;font-family:inherit;font-size:13.5px;font-weight:800;border:0;border-radius:10px;
    padding:10px 16px;cursor:pointer;box-shadow:0 8px 20px -8px rgba(244,196,81,.6);transition:.15s}
  .loadbtn:hover{transform:translateY(-1px)}
  .loadnote{font-size:11.5px;color:var(--dim);text-align:right;max-width:280px}
  .loadnote b{color:var(--mine)}

  .tabs{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:6px;margin-bottom:22px;overflow-x:auto}
  .tab{flex:1;min-width:74px;border:0;background:transparent;color:var(--muted);font-family:inherit;font-size:15px;font-weight:700;padding:11px 6px;border-radius:9px;cursor:pointer;transition:.18s;white-space:nowrap}
  .tab:hover{color:var(--tx);background:rgba(255,255,255,.04)}
  .tab.active{color:#1a1206;background:linear-gradient(135deg,var(--gold),var(--gold2));box-shadow:0 6px 18px -6px rgba(244,196,81,.6)}
  .tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--mine);margin-left:6px;vertical-align:middle}
  .tab.empty{color:var(--dim)} .tab.empty .dot{background:var(--dim);opacity:.5}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
  .kpi.b::before{background:var(--s4)} .kpi.c::before{background:var(--s6)} .kpi.d::before{background:var(--s9)}
  .kpi .lab{font-size:12.5px;color:var(--muted);font-weight:600}
  .kpi .val{font-size:clamp(22px,3vw,30px);font-weight:800;margin-top:7px;letter-spacing:-.02em;line-height:1}
  .kpi .meta{font-size:12px;color:var(--dim);margin-top:7px}

  .grid{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line)}
  .card-h h2{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .card-h .hint{font-size:12px;color:var(--dim)}

  .search{position:relative;width:190px}
  .search input{width:100%;background:var(--bg2);border:1px solid var(--line2);color:var(--tx);font-family:inherit;font-size:13px;border-radius:9px;padding:8px 10px 8px 30px;outline:none}
  .search input:focus{border-color:var(--gold)}
  .search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.5}

  .podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:12px;padding:20px;align-items:end}
  .pod{border-radius:14px;padding:16px 14px;text-align:center;position:relative;border:1px solid var(--line2);background:var(--panel2);cursor:pointer;transition:.2s}
  .pod:hover{transform:translateY(-3px)}
  .pod .medal{font-size:24px;font-weight:900;width:42px;height:42px;line-height:42px;border-radius:50%;margin:0 auto 10px;color:#1a1206}
  .pod.g{background:linear-gradient(180deg,rgba(244,196,81,.18),rgba(244,196,81,.04));border-color:rgba(244,196,81,.5);padding-top:26px;padding-bottom:26px}
  .pod.g .medal{background:linear-gradient(135deg,var(--gold),var(--gold2));box-shadow:0 8px 22px -8px rgba(244,196,81,.8)}
  .pod.s{background:linear-gradient(180deg,rgba(195,208,234,.14),rgba(195,208,234,.03));border-color:rgba(195,208,234,.45)}
  .pod.s .medal{background:linear-gradient(135deg,var(--silver),var(--silver2))}
  .pod.br{background:linear-gradient(180deg,rgba(220,146,85,.15),rgba(220,146,85,.03));border-color:rgba(220,146,85,.45)}
  .pod.br .medal{background:linear-gradient(135deg,var(--bronze),var(--bronze2))}
  .pod .nm{font-size:13.5px;font-weight:700;line-height:1.3;min-height:2.6em;display:flex;align-items:center;justify-content:center;word-break:keep-all}
  .pod .sc{font-size:clamp(15px,2vw,19px);font-weight:800;margin-top:8px;letter-spacing:-.02em}
  .pod.g .sc{color:var(--gold)} .pod.s .sc{color:var(--silver)} .pod.br .sc{color:var(--bronze)}

  .list{max-height:560px;overflow-y:auto}
  .list::-webkit-scrollbar{width:8px}
  .list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
  .row{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s}
  .row:hover{background:rgba(255,255,255,.035)}
  .row.mine{background:linear-gradient(90deg,rgba(70,207,134,.16),rgba(70,207,134,.03));box-shadow:inset 3px 0 0 var(--mine)}
  .row.hit{background:rgba(244,196,81,.13);box-shadow:inset 3px 0 0 var(--gold)}
  .rk{font-size:15px;font-weight:800;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums}
  .row.top .rk{color:var(--gold)}
  .info{min-width:0}
  .info .pn{font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .info .pg{font-size:11.5px;color:var(--dim);margin-top:2px}
  .info .pg .me{color:var(--mine);font-weight:700}
  .sright{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .sright .scv{font-size:15px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .tag{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:6px}

  .stack{display:flex;flex-direction:column;gap:20px}
  .dist{padding:16px 20px 20px}
  .drow{display:grid;grid-template-columns:46px 1fr 34px;align-items:center;gap:10px;margin-bottom:9px}
  .drow .dl{font-size:12.5px;font-weight:700;color:var(--muted)}
  .bar{height:18px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden}
  .bar i{display:block;height:100%;border-radius:6px;transition:width .7s cubic-bezier(.2,.8,.2,1)}
  .drow .dc{font-size:12.5px;font-weight:800;text-align:right;font-variant-numeric:tabular-nums}
  .drow.zero{opacity:.4}
  .stbl{padding:6px 0 8px}
  .strow{display:grid;grid-template-columns:54px 1fr;gap:10px;align-items:center;padding:8px 20px}
  .strow .sb{font-size:12px;font-weight:800;padding:3px 0;border-radius:6px;text-align:center;color:#0c1322}
  .strow .sr{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

  .empty-state{padding:60px 20px;text-align:center;color:var(--dim)}
  .empty-state .ico{font-size:40px;opacity:.5;margin-bottom:12px}
  .empty-state p{font-size:14px;line-height:1.6}
  .foot{text-align:center;color:var(--dim);font-size:11.5px;margin-top:28px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--raised);
    border:1px solid var(--line2);color:var(--tx);font-size:13.5px;font-weight:600;padding:12px 20px;border-radius:12px;
    box-shadow:0 12px 30px -8px rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:.3s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{border-color:var(--s9)}

  /* 달력 버튼 */
  .calbtn{display:inline-flex;align-items:center;gap:7px;background:var(--panel2);color:var(--tx);
    font-size:13.5px;font-weight:700;border:1px solid var(--line2);border-radius:10px;
    padding:10px 14px;cursor:pointer;transition:.15s}
  .calbtn:hover{border-color:var(--gold);background:var(--raised)}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}

  /* 선택 날짜 뱃지 */
  .datebadge{display:none;align-items:center;gap:10px;background:linear-gradient(90deg,rgba(70,207,134,.16),rgba(70,207,134,.04));
    border:1px solid rgba(70,207,134,.4);border-radius:12px;padding:9px 14px;margin-bottom:18px}
  .datebadge.show{display:flex}
  .datebadge .ic{font-size:16px}
  .datebadge .txt{font-size:13.5px;font-weight:700}
  .datebadge .txt b{color:var(--mine)}
  .datebadge .clr{margin-left:auto;background:transparent;border:1px solid var(--line2);color:var(--muted);
    font-size:12px;font-weight:700;border-radius:8px;padding:5px 11px;cursor:pointer}
  .datebadge .clr:hover{color:var(--tx);border-color:var(--gold)}

  /* 달력 모달 */
  .modal{position:fixed;inset:0;background:rgba(6,10,20,.66);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
  .modal.show{display:flex}
  .cal{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line2);
    border-radius:18px;padding:20px;width:min(420px,100%);box-shadow:0 30px 80px -20px rgba(0,0,0,.8)}
  .cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .cal-top h3{font-size:15px;font-weight:800}
  .cal-x{background:transparent;border:0;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:4px}
  .cal-x:hover{color:var(--tx)}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:8px 0 14px}
  .cal-nav button{background:var(--raised);border:1px solid var(--line2);color:var(--tx);
    width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;font-weight:800;transition:.15s}
  .cal-nav button:hover{border-color:var(--gold)}
  .cal-nav button:disabled{opacity:.3;cursor:default}
  .cal-nav .ym{font-size:15px;font-weight:800;letter-spacing:.02em}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--dim);padding:4px 0}
  .cal-dow.sun{color:var(--s9)} .cal-dow.sat{color:var(--s4)}
  .cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:10px;font-size:13px;font-weight:700;color:var(--dim);position:relative;border:1px solid transparent}
  .cal-cell.pad{visibility:hidden}
  .cal-cell.has{color:var(--tx);background:var(--raised);border-color:var(--line2);cursor:pointer;transition:.13s}
  .cal-cell.has:hover{border-color:var(--gold);transform:translateY(-2px)}
  .cal-cell.has .pt{width:5px;height:5px;border-radius:50%;background:var(--mine);margin-top:3px}
  .cal-cell.sel{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1206;border-color:transparent}
  .cal-cell.sel .pt{background:#1a1206}
  .cal-cell.today{box-shadow:inset 0 0 0 1px var(--gold)}
  .cal-foot{margin-top:14px;font-size:11.5px;color:var(--dim);display:flex;align-items:center;gap:7px;justify-content:center}
  .cal-foot .leg{display:inline-flex;align-items:center;gap:5px}
  .cal-foot .leg i{width:6px;height:6px;border-radius:50%;background:var(--mine);display:inline-block}

  @media(max-width:900px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.podium{grid-template-columns:1fr;gap:10px}.pod.g{order:-1}.search{width:140px}.rightcol{align-items:flex-start}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="eyebrow">Guild War · Ranking</div>
      <h1>길드전 랭킹 <span class="guild">[ 빌 런 ] 착한사람들</span></h1>
      <div class="sub">요일별 랭킹 포인트</div>
    </div>
    <div class="rightcol">
      <div class="btnrow">
        <button class="calbtn" id="calBtn">📅 달력으로 보기</button>
        <button class="loadbtn" id="loadBtn">📂 엑셀 불러오기</button>
      </div>
      <input type="file" id="fileIn" accept=".xlsx,.xlsm" style="display:none">
      <div class="datebox"><div class="d" id="srcLabel">집계 기준일</div><div class="v num" id="dateVal">2026.06.16</div></div>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div class="datebadge" id="dateBadge">
    <span class="ic">📅</span>
    <span class="txt" id="badgeTxt"></span>
    <button class="clr" id="badgeClr">이번 주로 돌아가기</button>
  </div>
  <div class="kpis" id="kpis"></div>

  <div class="grid">
    <div class="card">
      <div class="card-h">
        <h2>랭킹 <span class="hint" id="rankhint"></span></h2>
        <div class="search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="q" placeholder="플레이어 검색" autocomplete="off">
        </div>
      </div>
      <div id="podium"></div>
      <div class="list" id="list"></div>
    </div>
    <div class="stack">
      <div class="card"><div class="card-h"><h2>단계별 인원 분포</h2><span class="hint" id="disthint"></span></div><div class="dist" id="dist"></div></div>
      <div class="card"><div class="card-h"><h2>단계 기준표</h2><span class="hint">점수 → 단계</span></div><div class="stbl" id="stbl"></div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- 달력 모달 -->
<div class="modal" id="calModal">
  <div class="cal">
    <div class="cal-top">
      <h3>📅 날짜별 기록 보기</h3>
      <button class="cal-x" id="calClose">×</button>
    </div>
    <div class="cal-nav">
      <button id="calPrev">‹</button>
      <div class="ym" id="calYM"></div>
      <button id="calNext">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

const STAGE_NAMES=["1단계","2단계","3단계","4단계","5단계","6단계","7단계","8단계","9단계"];

let WEEKDATES={"월요일":"2026-06-15","화요일":"2026-06-16","수요일":"2026-06-17","목요일":"2026-06-18","금요일":"2026-06-19","토요일":"2026-06-20"};
/* 날짜(YYYY-MM-DD) → {players,summary,weekday}. 월별 보관시트 + 요일시트에서 구성. */
let BYDATE={};
/* 현재 보기: 요일 탭 보기 {type:'day'} 또는 달력 날짜 보기 {type:'date',date} */

const abbr=n=> n>=1e8? (n/1e8).toFixed(2)+"억" : n>=1e4? Math.round(n/1e4).toLocaleString()+"만" : fmt(n);
const WD_KOR=["일","월","화","수","목","금","토"];

/* players 배열로 summary 계산 */
function summarize(players){
  const s={}; STAGE_NAMES.forEach(x=>s[x]=0);
  players.forEach(p=>{ if(p.stage in s) s[p.stage]++; });
  s["총 인원"]=players.length;
  s["총 점수"]=players.reduce((a,p)=>a+p.score,0);
  return s;
}
/* 날짜 문자열 → 요일명(월요일 등) */
function weekdayOf(ds){ const d=new Date(ds+"T00:00:00"); return WD_KOR[d.getDay()]+"요일"; }

/* DATA.days + WEEKDATES + DATA.archive 로부터 BYDATE 재구성 */
function rebuildByDate(){
  BYDATE={};
  // 1) 월별 보관 시트(archive) 우선
  const arch=DATA.archive||{};
  Object.keys(arch).forEach(ds=>{
    const players=arch[ds];
    if(players&&players.length) BYDATE[ds]={players,summary:summarize(players),weekday:weekdayOf(ds)};
  });
  // 2) 요일 시트: 보관에 없는 날짜만 추가
  DAYS.forEach(d=>{
    const ds=WEEKDATES[d];
    const day=DATA.days[d];
    if(ds&&day&&day.players.length&&!BYDATE[ds]){
      BYDATE[ds]={players:day.players,summary:day.summary,weekday:d};
    }
  });
}

function normDate(v){
  if(v==null||v==="") return null;
  if(typeof v==="number" && isFinite(v)){
    const d=new Date(Date.UTC(1899,11,30)+Math.round(v)*86400000);
    return d.toISOString().slice(0,10);
  }
  let s=String(v).trim().replace(/[.\/]/g,"-");
  const m=s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return m[1]+"-"+String(m[2]).padStart(2,"0")+"-"+String(m[3]).padStart(2,"0");
  return null;
}

function parseWorkbook(wb){
  const out={days:{},stages:[],archive:{}};
  const weekDates={};
  let totalPlayers=0; const filledDays=[];
  const J=ws=>XLSX.utils.sheet_to_json(ws,{header:"A",raw:true,defval:null}); // 컬럼 문자 키

  // 1) 기준표 먼저 (단계 자동분류용): B=하한점수, C=단계, D=범위
  const kb=wb.Sheets["기준표"];
  if(kb){
    J(kb).forEach(row=>{
      const mn=row.B, st=row.C, rg=row.D;
      if(typeof mn==="number" && st && String(st).includes("단계")){
        out.stages.push({min:mn,stage:String(st).trim(),range:rg?String(rg).trim():""});
      }
    });
  }
  if(!out.stages.length) out.stages = (DATA.stages||[]);

  // 2) 요일 시트(월~토): C1=기준일자, B/C/D/E=순위/플레이어/점수/단계, G/H=요약
  DAYS.forEach(name=>{
    const players=[], summary={};
    const ws=wb.Sheets[name];
    if(ws){
      const rows=J(ws);
      for(const row of rows.slice(0,3)){
        for(const k of ["C","D","B","E"]){ const nd=normDate(row[k]); if(nd){ weekDates[name]=nd; break; } }
        if(weekDates[name]) break;
      }
      rows.forEach(row=>{
        const rk=row.B, pl=row.C, sc=row.D, st=row.E;
        if(typeof rk==="number" && pl && typeof sc==="number"){
          players.push({rank:rk,player:String(pl).trim(),score:sc,stage:st&&String(st).includes("단계")?String(st).trim():stageFromScore(sc,out.stages)});
        }
        const lab=row.G, val=row.H;
        if(lab!=null && typeof val==="number"){ summary[String(lab).trim()]=val; }
      });
    }
    if(!weekDates[name]) weekDates[name]=WEEKDATES[name]||null;
    if(players.length){
      players.sort((a,b)=>b.score-a.score);
      players.forEach((p,i)=>p.rank=i+1);
      filledDays.push(name); totalPlayers+=players.length;
      if(!("총 인원" in summary)){
        STAGE_NAMES.forEach(s=>summary[s]=players.filter(p=>p.stage===s).length);
        summary["총 인원"]=players.length;
        summary["총 점수"]=players.reduce((a,p)=>a+p.score,0);
      }
    } else {
      STAGE_NAMES.forEach(s=>summary[s]=summary[s]||0);
      summary["총 인원"]=summary["총 인원"]||0; summary["총 점수"]=summary["총 점수"]||0;
    }
    out.days[name]={players,summary};
  });

  // 3) 월별 보관 시트(YYYY-MM): A=날짜, B=순위, C=플레이어, D=점수, E=단계
  wb.SheetNames.forEach(name=>{
    if(!/^\d{4}-\d{2}$/.test(name)) return;
    const ws=wb.Sheets[name]; if(!ws) return;
    J(ws).forEach(row=>{
      const ds=normDate(row.A); const pl=row.C, sc=row.D, st=row.E;
      if(ds && pl && typeof sc==="number"){
        (out.archive[ds]=out.archive[ds]||[]).push({
          player:String(pl).trim(),score:sc,
          stage:st&&String(st).includes("단계")?String(st).trim():stageFromScore(sc,out.stages)
        });
      }
    });
  });
  Object.keys(out.archive).forEach(ds=>{
    const arr=out.archive[ds];
    arr.sort((a,b)=>b.score-a.score);
    arr.forEach((p,i)=>p.rank=i+1);
    totalPlayers+=arr.length;
  });

  return {data:out,weekDates,totalPlayers,filledDays};
}
function stageFromScore(sc,stages){
  if(!stages||!stages.length) return null;
  let cur=stages[0].stage;
  for(const s of stages){ if(sc>=s.min) cur=s.stage; }
  return cur;
}

const tabsEl=document.getElementById("tabs");
function buildTabs(){
  tabsEl.innerHTML="";
  DAYS.forEach(d=>{
    const has=DATA.days[d]&&DATA.days[d].players.length>0;
    const b=document.createElement("button");
    b.className="tab"+(has?"":" empty")+(d===cur?" active":"");
    b.dataset.day=d;
    b.innerHTML=d.replace("요일","")+(has?'<span class="dot"></span>':'');
    b.onclick=()=>{cur=d;curView={type:"day"};render();};
    tabsEl.appendChild(b);
  });
}

  document.getElementById("rankhint").textContent=empty?"":`${viewLabel} · ${cnt}명`;

  if(empty){
    document.getElementById("podium").innerHTML="";

    renderDist(S,true); renderTable(); return;
  }
  const [p1,p2,p3]=P;
  document.getElementById("podium").innerHTML=`<div class="podium">${pod(p2,"s","2")}${pod(p1,"g","1")}${pod(p3,"br","3")}</div>`;
  document.querySelectorAll(".pod").forEach(el=>el.onclick=()=>scrollToRank(el.dataset.r));
  document.getElementById("list").innerHTML=P.map(rowHTML).join("");
  attachRows(); renderDist(S,false); renderTable(); applyFilter();
}
function fmtDateK(ds){ const [y,m,d]=ds.split("-"); return `${y}년 ${+m}월 ${+d}일`; }
function pod(p,cls,m){return `<div class="pod ${cls}" data-r="${p.rank}"><div class="medal">${m}</div><div class="nm">${esc(p.player)}</div><div class="sc num">${fmt(p.score)}</div></div>`;}
function rowHTML(p){
  const c=STAGE_COLOR[p.stage]||"var(--s1)"; const mine=p.player===MINE?" mine":""; const top=p.rank<=3?" top":"";
  return `<div class="row${top}${mine}" data-r="${p.rank}" data-n="${esc(p.player)}">
    <div class="rk num">${p.rank}</div>
    <div class="info"><div class="pn">${esc(p.player)}</div><div class="pg">[ 빌 런 ] 착한사람들${mine?' · <span class="me">내 기록</span>':''}</div></div>
    <div class="sright"><div class="scv num">${fmt(p.score)}</div><div class="tag" style="background:${c}22;color:${c}">${esc(p.stage||"-")}</div></div></div>`;
}
function renderDist(S,empty){
  const max=Math.max(1,...DATA.stages.map(s=>S[s.stage]||0));
  document.getElementById("dist").innerHTML=[...DATA.stages].reverse().map(s=>{
    const v=S[s.stage]||0,c=STAGE_COLOR[s.stage],w=empty?0:(v/max*100);
    return `<div class="drow${v===0?" zero":""}"><div class="dl">${s.stage}</div><div class="bar"><i style="width:${w}%;background:${c}"></i></div><div class="dc num" style="color:${v?c:'var(--dim)'}">${v}</div></div>`;
  }).join("");
}
function renderTable(){
  document.getElementById("stbl").innerHTML=[...DATA.stages].reverse().map(s=>{
    const c=STAGE_COLOR[s.stage];
    return `<div class="strow"><div class="sb" style="background:${c}">${s.stage}</div><div class="sr">${esc(s.range)}</div></div>`;
  }).join("");
}
function attachRows(){document.querySelectorAll(".list .row").forEach(el=>el.onclick=()=>el.classList.toggle("hit"));}
function scrollToRank(rank){const el=document.querySelector(`.list .row[data-r="${rank}"]`);if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.classList.add("hit");setTimeout(()=>el.classList.remove("hit"),1600);}}

const qEl=document.getElementById("q"); qEl.oninput=applyFilter;
function applyFilter(){
  const q=qEl.value.trim().toLowerCase();
  document.querySelectorAll(".list .row").forEach(el=>{
    const show=!q||el.dataset.n.toLowerCase().includes(q);
    el.style.display=show?"":"none"; el.classList.toggle("hit",q&&show);
  });
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
let tT; function toast(m,kind){const t=document.getElementById("toast");t.textContent=m;t.className="toast show"+(kind==="err"?" err":"");clearTimeout(tT);tT=setTimeout(()=>t.className="toast",2800);}

/* ---------- 달력 ---------- */
let calYear, calMonth; // 현재 표시 중인 연/월(0-based month)
const modal=document.getElementById("calModal");
function openCalendar(){
  const dates=Object.keys(BYDATE).sort();
  if(dates.length){ const last=dates[dates.length-1].split("-"); calYear=+last[0]; calMonth=+last[1]-1; }
  else { const t=new Date(); calYear=t.getFullYear(); calMonth=t.getMonth(); }
  renderCalendar(); modal.classList.add("show");
}
function closeCalendar(){ modal.classList.remove("show"); }
function calShift(delta){
  let m=calMonth+delta, y=calYear;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  calYear=y; calMonth=m; renderCalendar();
}
function renderCalendar(){
  document.getElementById("calYM").textContent=`${calYear}년 ${calMonth+1}월`;
  const grid=document.getElementById("calGrid"); grid.innerHTML="";
  ["일","월","화","수","목","금","토"].forEach((d,i)=>{
    const el=document.createElement("div");
    el.className="cal-dow"+(i===0?" sun":i===6?" sat":"");
    el.textContent=d; grid.appendChild(el);
  });
  const first=new Date(calYear,calMonth,1).getDay();
  const ndays=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<first;i++){ const p=document.createElement("div"); p.className="cal-cell pad"; grid.appendChild(p); }
  const todayStr=new Date().toISOString().slice(0,10);
  for(let d=1;d<=ndays;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const has=!!BYDATE[ds];
    const cell=document.createElement("div");
    cell.className="cal-cell"+(has?" has":"")+(curView.type==="date"&&curView.date===ds?" sel":"")+(ds===todayStr?" today":"");
    cell.innerHTML=`${d}${has?'<span class="pt"></span>':''}`;
    if(has) cell.onclick=()=>{ selectDate(ds); };
    grid.appendChild(cell);
  }
  // 가용 달 이동 제한 (데이터 범위 ±1달까지만)
  const dates=Object.keys(BYDATE).sort();
  document.getElementById("calPrev").disabled=false;
  document.getElementById("calNext").disabled=false;
}
function selectDate(ds){
  curView={type:"date",date:ds};
  closeCalendar(); render();
  toast(fmtDateK(ds)+" 기록을 불러왔어요");
  window.scrollTo({top:0,behavior:"smooth"});
}

document.getElementById("calBtn").onclick=openCalendar;
document.getElementById("calClose").onclick=closeCalendar;
document.getElementById("calPrev").onclick=()=>calShift(-1);
document.getElementById("calNext").onclick=()=>calShift(1);
document.getElementById("badgeClr").onclick=()=>{ curView={type:"day"}; render(); };
modal.onclick=e=>{ if(e.target===modal) closeCalendar(); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeCalendar(); });

/* ---------- 초기화 ---------- */
rebuildByDate();
buildTabs(); render();
</script>
</body>
</html>
