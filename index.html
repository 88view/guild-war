<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>길드전 랭킹 대시보드 · [빌 런]착한사람들</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#0c1322; --bg2:#0f192b;
    --panel:#15203a; --panel2:#1a2742; --raised:#1f2e4e;
    --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.12);
    --tx:#eaf0fb; --muted:#8a99bd; --dim:#5b6b8e;
    --gold:#f4c451; --gold2:#d99f28;
    --silver:#c3d0ea; --silver2:#8fa3c8;
    --bronze:#dc9255; --bronze2:#b06f37;
    --mine:#46cf86;
    --s9:#ff5e7e; --s8:#ff9f43; --s7:#ffd24d; --s6:#5fd089;
    --s5:#37cdbf; --s4:#46a6ff; --s3:#7f9bff; --s2:#b58cff; --s1:#7787ab;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard',system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(244,196,81,.08), transparent 60%),
      radial-gradient(900px 500px at -5% 0%, rgba(70,166,255,.07), transparent 55%),
      var(--bg);
    color:var(--tx); min-height:100vh; -webkit-font-smoothing:antialiased;
    padding:28px clamp(14px,4vw,48px) 56px;
  }
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .wrap{max-width:1240px;margin:0 auto}

  /* ===== Header ===== */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:22px}
  .brand .eyebrow{font-size:12px;letter-spacing:.32em;color:var(--gold);font-weight:700;text-transform:uppercase}
  .brand h1{font-size:clamp(26px,4vw,38px);font-weight:800;letter-spacing:-.02em;margin-top:6px;line-height:1.05}
  .brand h1 .guild{
    background:linear-gradient(120deg,var(--gold),#ffe9a8 55%,var(--gold2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .brand .sub{color:var(--muted);font-size:13.5px;margin-top:8px}
  .datebox{text-align:right}
  .datebox .d{font-size:13px;color:var(--dim);letter-spacing:.04em}
  .datebox .v{font-size:20px;font-weight:700;margin-top:2px}

  /* ===== Day tabs ===== */
  .tabs{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);
        border-radius:14px;padding:6px;margin-bottom:22px;overflow-x:auto}
  .tab{flex:1;min-width:74px;border:0;background:transparent;color:var(--muted);
       font-family:inherit;font-size:15px;font-weight:700;padding:11px 6px;border-radius:9px;
       cursor:pointer;transition:.18s;position:relative;white-space:nowrap}
  .tab:hover{color:var(--tx);background:rgba(255,255,255,.04)}
  .tab.active{color:#1a1206;background:linear-gradient(135deg,var(--gold),var(--gold2));
              box-shadow:0 6px 18px -6px rgba(244,196,81,.6)}
  .tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--mine);
            margin-left:6px;vertical-align:middle}
  .tab.empty{color:var(--dim)}
  .tab.empty .dot{background:var(--dim);opacity:.5}

  /* ===== KPIs ===== */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
       border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
  .kpi.b::before{background:var(--s4)} .kpi.c::before{background:var(--s6)} .kpi.d::before{background:var(--s9)}
  .kpi .lab{font-size:12.5px;color:var(--muted);font-weight:600;letter-spacing:.02em}
  .kpi .val{font-size:clamp(22px,3vw,30px);font-weight:800;margin-top:7px;letter-spacing:-.02em;line-height:1}
  .kpi .meta{font-size:12px;color:var(--dim);margin-top:7px}

  /* ===== Layout ===== */
  .grid{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;
          padding:16px 20px;border-bottom:1px solid var(--line)}
  .card-h h2{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .card-h .hint{font-size:12px;color:var(--dim)}

  /* search */
  .search{position:relative;width:190px}
  .search input{width:100%;background:var(--bg2);border:1px solid var(--line2);color:var(--tx);
    font-family:inherit;font-size:13px;border-radius:9px;padding:8px 10px 8px 30px;outline:none}
  .search input:focus{border-color:var(--gold)}
  .search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.5}

  /* ===== Podium ===== */
  .podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:12px;padding:20px;align-items:end}
  .pod{border-radius:14px;padding:16px 14px;text-align:center;position:relative;
       border:1px solid var(--line2);background:var(--panel2);cursor:pointer;transition:.2s}
  .pod:hover{transform:translateY(-3px)}
  .pod .medal{font-size:24px;font-weight:900;width:42px;height:42px;line-height:42px;border-radius:50%;
              margin:0 auto 10px;color:#1a1206}
  .pod.g{background:linear-gradient(180deg,rgba(244,196,81,.18),rgba(244,196,81,.04));
         border-color:rgba(244,196,81,.5);padding-top:26px;padding-bottom:26px}
  .pod.g .medal{background:linear-gradient(135deg,var(--gold),var(--gold2));box-shadow:0 8px 22px -8px rgba(244,196,81,.8)}
  .pod.s{background:linear-gradient(180deg,rgba(195,208,234,.14),rgba(195,208,234,.03));border-color:rgba(195,208,234,.45)}
  .pod.s .medal{background:linear-gradient(135deg,var(--silver),var(--silver2))}
  .pod.br{background:linear-gradient(180deg,rgba(220,146,85,.15),rgba(220,146,85,.03));border-color:rgba(220,146,85,.45)}
  .pod.br .medal{background:linear-gradient(135deg,var(--bronze),var(--bronze2))}
  .pod .nm{font-size:13.5px;font-weight:700;line-height:1.3;min-height:2.6em;
           display:flex;align-items:center;justify-content:center;word-break:keep-all}
  .pod .sc{font-size:clamp(15px,2vw,19px);font-weight:800;margin-top:8px;letter-spacing:-.02em}
  .pod.g .sc{color:var(--gold)} .pod.s .sc{color:var(--silver)} .pod.br .sc{color:var(--bronze)}

  /* ===== List ===== */
  .list{max-height:560px;overflow-y:auto}
  .list::-webkit-scrollbar{width:8px}
  .list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
  .row{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:12px;
       padding:12px 20px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s}
  .row:hover{background:rgba(255,255,255,.035)}
  .row.mine{background:linear-gradient(90deg,rgba(70,207,134,.16),rgba(70,207,134,.03));
            box-shadow:inset 3px 0 0 var(--mine)}
  .row.hit{background:rgba(244,196,81,.13);box-shadow:inset 3px 0 0 var(--gold)}
  .rk{font-size:15px;font-weight:800;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums}
  .row.top .rk{color:var(--gold)}
  .info{min-width:0}
  .info .pn{font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .info .pg{font-size:11.5px;color:var(--dim);margin-top:2px}
  .info .pg .me{color:var(--mine);font-weight:700}
  .sright{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .sright .scv{font-size:15px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .tag{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.02em}

  /* ===== Right column ===== */
  .stack{display:flex;flex-direction:column;gap:20px}
  .dist{padding:16px 20px 20px}
  .drow{display:grid;grid-template-columns:46px 1fr 34px;align-items:center;gap:10px;margin-bottom:9px}
  .drow .dl{font-size:12.5px;font-weight:700;color:var(--muted)}
  .bar{height:18px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden;position:relative}
  .bar i{display:block;height:100%;border-radius:6px;transition:width .7s cubic-bezier(.2,.8,.2,1)}
  .drow .dc{font-size:12.5px;font-weight:800;text-align:right;font-variant-numeric:tabular-nums}
  .drow.zero{opacity:.4}

  .stbl{padding:6px 0 8px}
  .strow{display:grid;grid-template-columns:54px 1fr;gap:10px;align-items:center;padding:8px 20px}
  .strow .sb{font-size:12px;font-weight:800;padding:3px 0;border-radius:6px;text-align:center;color:#0c1322}
  .strow .sr{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

  /* empty */
  .empty-state{padding:60px 20px;text-align:center;color:var(--dim)}
  .empty-state .ico{font-size:40px;opacity:.5;margin-bottom:12px}
  .empty-state p{font-size:14px;line-height:1.6}
  .foot{text-align:center;color:var(--dim);font-size:11.5px;margin-top:28px}

  @media(max-width:900px){
    .grid{grid-template-columns:1fr}
    .kpis{grid-template-columns:repeat(2,1fr)}
  }
  @media(max-width:520px){
    .podium{grid-template-columns:1fr;gap:10px}
    .pod.g{order:-1}
    .search{width:140px}
  }
</style>

const DAYS=["월요일","화요일","수요일","목요일","금요일","토요일"];
const STAGE_COLOR={"9단계":"var(--s9)","8단계":"var(--s8)","7단계":"var(--s7)","6단계":"var(--s6)","5단계":"var(--s5)","4단계":"var(--s4)","3단계":"var(--s3)","2단계":"var(--s2)","1단계":"var(--s1)"};
const MINE="할말있는데나중에말해줌";   // 내 캐릭터(스샷 초록 행)
let cur="월요일";
const fmt=n=>n.toLocaleString("ko-KR");
const abbr=n=> n>=1e8? (n/1e8).toFixed(2)+"억" : n>=1e4? Math.round(n/1e4).toLocaleString()+"만" : fmt(n);

// tabs
const tabsEl=document.getElementById("tabs");
DAYS.forEach(d=>{
  const has=DATA.days[d].players.length>0;
  const b=document.createElement("button");
  b.className="tab"+(has?"":" empty")+(d===cur?" active":"");
  b.innerHTML=d.replace("요일","")+(has?'<span class="dot"></span>':'');
  b.onclick=()=>{cur=d;document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));b.classList.add("active");render();};
  tabsEl.appendChild(b);
});

function render(){
  const day=DATA.days[cur];
  const P=day.players, S=day.summary;
  const empty=P.length===0;

  // KPIs
  const total=S["총 점수"]||0, cnt=S["총 인원"]||0;
  const avg=cnt?Math.round(total/cnt):0;
  const top=P[0];
  document.getElementById("kpis").innerHTML=`
    <div class="kpi"><div class="lab">총 랭킹 포인트</div><div class="val num">${empty?"—":abbr(total)}</div><div class="meta num">${empty?"데이터 없음":fmt(total)+" P"}</div></div>
    <div class="kpi b"><div class="lab">참여 인원</div><div class="val num">${empty?"—":cnt}<span style="font-size:14px;color:var(--dim)"> 명</span></div><div class="meta">길드원 기록</div></div>
    <div class="kpi c"><div class="lab">평균 포인트</div><div class="val num">${empty?"—":abbr(avg)}</div><div class="meta num">${empty?"":fmt(avg)+" P"}</div></div>
    <div class="kpi d"><div class="lab">1위 점수</div><div class="val num">${empty?"—":abbr(top.score)}</div><div class="meta">${empty?"":top.player}</div></div>`;

  document.getElementById("rankhint").textContent=empty?"":`${cur} · ${cnt}명`;
  document.getElementById("disthint").textContent=empty?"":`총 ${cnt}명`;

  // empty state
  if(empty){
    document.getElementById("podium").innerHTML="";
    document.getElementById("list").innerHTML=`<div class="empty-state"><div class="ico">📋</div><p><b>${cur}</b> 기록이 아직 없습니다.<br>해당 요일 랭킹 스크린샷을 입력하면<br>이 화면에 자동으로 채워집니다.</p></div>`;
    renderDist(S,true); renderTable(); return;
  }

  // podium (2-1-3 order)
  const [p1,p2,p3]=P;
  document.getElementById("podium").innerHTML=`<div class="podium">
    ${pod(p2,"s","2")}${pod(p1,"g","1")}${pod(p3,"br","3")}</div>`;
  document.querySelectorAll(".pod").forEach(el=>el.onclick=()=>scrollTo(el.dataset.r));

  // list
  document.getElementById("list").innerHTML=P.map(rowHTML).join("");
  attachRows();
  renderDist(S,false);
  renderTable();
  applyFilter();
}

function pod(p,cls,m){
  return `<div class="pod ${cls}" data-r="${p.rank}">
    <div class="medal">${m}</div>
    <div class="nm">${esc(p.player)}</div>
    <div class="sc num">${fmt(p.score)}</div></div>`;
}

function rowHTML(p){
  const c=STAGE_COLOR[p.stage]||"var(--s1)";
  const mine=p.player===MINE?" mine":"";
  const top=p.rank<=3?" top":"";
  return `<div class="row${top}${mine}" data-r="${p.rank}" data-n="${esc(p.player)}">
    <div class="rk num">${p.rank}</div>
    <div class="info">
      <div class="pn">${esc(p.player)}</div>
      <div class="pg">[ 빌 런 ]착한사람들${mine?' · <span class="me">내 기록</span>':''}</div>
    </div>
    <div class="sright">
      <div class="scv num">${fmt(p.score)}</div>
      <div class="tag" style="background:${c}22;color:${c}">${p.stage||"-"}</div>
    </div></div>`;
}

function renderDist(S,empty){
  const max=Math.max(1,...DATA.stages.map(s=>S[s.stage]||0));
  const html=[...DATA.stages].reverse().map(s=>{
    const v=S[s.stage]||0;
    const c=STAGE_COLOR[s.stage];
    const w=empty?0:(v/max*100);
    return `<div class="drow${v===0?" zero":""}">
      <div class="dl">${s.stage}</div>
      <div class="bar"><i style="width:${w}%;background:${c}"></i></div>
      <div class="dc num" style="color:${v?c:'var(--dim)'}">${v}</div></div>`;
  }).join("");
  document.getElementById("dist").innerHTML=html;
}

function renderTable(){
  document.getElementById("stbl").innerHTML=[...DATA.stages].reverse().map(s=>{
    const c=STAGE_COLOR[s.stage];
    return `<div class="strow">
      <div class="sb" style="background:${c}">${s.stage}</div>
      <div class="sr">${s.range}</div></div>`;
  }).join("");
}

function attachRows(){
  document.querySelectorAll(".list .row").forEach(el=>{
    el.onclick=()=>{ el.classList.toggle("hit"); };
  });
}
function scrollTo(rank){
  const el=document.querySelector(`.list .row[data-r="${rank}"]`);
  if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.classList.add("hit");
    setTimeout(()=>el.classList.remove("hit"),1600);}
}

const qEl=document.getElementById("q");
qEl.oninput=applyFilter;
function applyFilter(){
  const q=qEl.value.trim().toLowerCase();
  document.querySelectorAll(".list .row").forEach(el=>{
    const n=el.dataset.n.toLowerCase();
    const show=!q||n.includes(q);
    el.style.display=show?"":"none";
    el.classList.toggle("hit", q&&show);
  });
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
render();
</script>
</body>
</html>
